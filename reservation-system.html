<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議室予約システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; }
  input, select, textarea { font-family: inherit; }
  button { cursor: pointer; font-family: inherit; }
  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .hover-lift { transition: all 0.2s ease; }
  .hover-lift:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
  .step-active { background: #2563eb; color: white; }
  .step-done { background: #059669; color: white; }
  .step-pending { background: #cbd5e1; color: #64748b; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

const ROOMS = [
  { id: 1, name: "会議室 1", capacity: 6, color: "#2563EB" },
  { id: 2, name: "会議室 2", capacity: 8, color: "#7C3AED" },
  { id: 3, name: "会議室 3", capacity: 4, color: "#059669" },
  { id: 4, name: "会議室 4", capacity: 10, color: "#D97706" },
  { id: 5, name: "会議室 5", capacity: 6, color: "#DC2626" },
];

const CATEGORIES = [
  { id: "sdv", label: "症例SDV・必須文書閲覧", desc: "症例SDVおよび必須文書の閲覧" },
  { id: "unblind", label: "unblindモニターによる直接閲覧", desc: "unblindモニターによる直接閲覧" },
];

const TIME_SLOTS = [];
for (let h = 9; h < 17; h++) {
  TIME_SLOTS.push(`${String(h).padStart(2, "0")}:00`);
  TIME_SLOTS.push(`${String(h).padStart(2, "0")}:30`);
}

const WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];
const MONTHS_JP = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }
function getFirstDayOfMonth(year, month) { return new Date(year, month, 1).getDay(); }
function formatDate(date) {
  const y = date.getFullYear(), m = String(date.getMonth()+1).padStart(2,"0"), d = String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function isWeekday(year, month, day) { const dow = new Date(year, month, day).getDay(); return dow !== 0 && dow !== 6; }
function isWithinBookingWindow(year, month, day) {
  const target = new Date(year, month, day);
  const today = new Date(); today.setHours(0,0,0,0);
  const minDate = new Date(today); minDate.setDate(minDate.getDate() + 7);
  const maxDate = new Date(today); maxDate.setDate(maxDate.getDate() + 60);
  return target >= minDate && target <= maxDate;
}

function generateMockBookings() {
  const bookings = {};
  const today = new Date();
  for (let i = 10; i < 50; i += 3) {
    const d = new Date(today); d.setDate(d.getDate() + i);
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    const key = formatDate(d);
    const roomId = (i % 5) + 1;
    const slotIdx = (i % 6) * 2;
    if (!bookings[key]) bookings[key] = [];
    bookings[key].push({ roomId, startTime: TIME_SLOTS[slotIdx] || "10:00", endTime: TIME_SLOTS[slotIdx + 3] || "11:30", category: i % 2 === 0 ? "sdv" : "unblind", name: "予約済み" });
  }
  return bookings;
}

const CalendarIcon = () => (<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>);
const ClockIcon = () => (<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>);
const CheckIcon = () => (<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><polyline points="20,6 9,17 4,12"/></svg>);
const ChevronLeft = () => (<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="15,18 9,12 15,6"/></svg>);
const ChevronRight = () => (<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="9,6 15,12 9,18"/></svg>);
const UserIcon = () => (<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);
const BuildingIcon = () => (<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="1"/><line x1="9" y1="6" x2="9" y2="6.01"/><line x1="15" y1="6" x2="15" y2="6.01"/><line x1="9" y1="10" x2="9" y2="10.01"/><line x1="15" y1="10" x2="15" y2="10.01"/><line x1="9" y1="14" x2="9" y2="14.01"/><line x1="15" y1="14" x2="15" y2="14.01"/><path d="M9 18h6v4H9z"/></svg>);

function App() {
  const today = new Date();
  const [currentMonth, setCurrentMonth] = useState(today.getMonth());
  const [currentYear, setCurrentYear] = useState(today.getFullYear());
  const [selectedRoom, setSelectedRoom] = useState(null);
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedCategory, setSelectedCategory] = useState(null);
  const [startTime, setStartTime] = useState("");
  const [endTime, setEndTime] = useState("");
  const [bookings, setBookings] = useState(generateMockBookings);
  const [step, setStep] = useState(1);
  const [formData, setFormData] = useState({ name:"", company:"", email:"", phone:"", trialName:"", remarks:"" });
  const [errors, setErrors] = useState({});

  const prevMonth = () => { if (currentMonth===0){setCurrentMonth(11);setCurrentYear(currentYear-1);}else{setCurrentMonth(currentMonth-1);} };
  const nextMonth = () => { if (currentMonth===11){setCurrentMonth(0);setCurrentYear(currentYear+1);}else{setCurrentMonth(currentMonth+1);} };

  const daysInMonth = getDaysInMonth(currentYear, currentMonth);
  const firstDay = getFirstDayOfMonth(currentYear, currentMonth);

  const getBookingsForDate = useCallback((dateStr) => (bookings[dateStr]||[]).filter(b => !selectedRoom || b.roomId===selectedRoom.id), [bookings, selectedRoom]);
  const isSlotBooked = useCallback((dateStr, time) => getBookingsForDate(dateStr).some(b => time>=b.startTime && time<b.endTime), [getBookingsForDate]);

  const availableEndTimes = useMemo(() => {
    if (!startTime || !selectedDate) return [];
    const startIdx = TIME_SLOTS.indexOf(startTime);
    return TIME_SLOTS.filter((t,i) => {
      if (i<=startIdx) return false;
      if (t==="12:00"||t==="12:30") return false;
      for (let j=startIdx+1;j<=i;j++) { if (isSlotBooked(selectedDate,TIME_SLOTS[j-1])) return false; }
      return true;
    });
  }, [startTime, selectedDate, isSlotBooked]);

  const validateForm = () => {
    const e = {};
    if (!formData.name.trim()) e.name="氏名を入力してください";
    if (!formData.company.trim()) e.company="所属を入力してください";
    if (!formData.email.trim()) e.email="メールアドレスを入力してください";
    else if (!/\S+@\S+\.\S+/.test(formData.email)) e.email="正しいメールアドレスを入力してください";
    if (!formData.trialName.trim()) e.trialName="治験名を入力してください";
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const handleSubmit = () => {
    if (!validateForm()) return;
    const newBooking = { roomId:selectedRoom.id, startTime, endTime, category:selectedCategory, name:formData.name, company:formData.company };
    setBookings(prev => ({ ...prev, [selectedDate]:[...(prev[selectedDate]||[]), newBooking] }));
    setStep(5);
  };

  const resetAll = () => {
    setStep(1); setSelectedRoom(null); setSelectedDate(null); setSelectedCategory(null);
    setStartTime(""); setEndTime("");
    setFormData({name:"",company:"",email:"",phone:"",trialName:"",remarks:""});
    setErrors({});
  };

  const selectedDateObj = selectedDate ? new Date(selectedDate+"T00:00:00") : null;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(145deg,#f0f4f8 0%,#e2e8f0 50%,#f0f4f8 100%)" }}>
      {/* Header */}
      <header style={{ background:"linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%)", color:"white", padding:"20px 0", boxShadow:"0 4px 20px rgba(30,58,95,0.3)" }}>
        <div style={{ maxWidth:1100, margin:"0 auto", padding:"0 24px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:4 }}>
            <div style={{ width:40,height:40,borderRadius:10,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(10px)" }}><CalendarIcon/></div>
            <div>
              <h1 style={{ fontSize:22, fontWeight:700, letterSpacing:"0.02em", fontFamily:"'DM Sans','Noto Sans JP',sans-serif" }}>会議室予約システム</h1>
              <p style={{ fontSize:12, opacity:0.8, marginTop:2 }}>治験・製造販売後臨床試験専用 ｜ SDV予約</p>
            </div>
          </div>
        </div>
      </header>

      <div style={{ maxWidth:1100, margin:"0 auto", padding:"24px 24px 60px" }}>
        {/* Stepper */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:0, marginBottom:32, flexWrap:"wrap" }}>
          {["会議室選択","日付選択","時間・情報入力","確認","完了"].map((label,i) => {
            const stepNum = i+1;
            const cls = step>stepNum?"step-done":step===stepNum?"step-active":"step-pending";
            return (<div key={i} style={{display:"flex",alignItems:"center"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:70}}>
                <div className={cls} style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,transition:"all 0.3s"}}>
                  {step>stepNum?<CheckIcon/>:stepNum}
                </div>
                <span style={{fontSize:11,marginTop:4,color:step>=stepNum?"#1e3a5f":"#94a3b8",fontWeight:step===stepNum?600:400}}>{label}</span>
              </div>
              {i<4 && <div style={{width:40,height:2,borderRadius:1,background:step>stepNum?"#059669":"#cbd5e1",margin:"0 4px",marginBottom:18,transition:"background 0.3s"}}/>}
            </div>);
          })}
        </div>

        {/* Step 1: Room Selection */}
        {step===1 && (
          <div className="fade-in">
            <h2 style={{fontSize:18,fontWeight:600,color:"#1e3a5f",marginBottom:6}}>会議室を選択してください</h2>
            <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>ご利用になる会議室を選択してください。「すべての会議室」では空き状況を確認できません。</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:16}}>
              {ROOMS.map(room => (
                <button key={room.id} className="hover-lift" onClick={()=>{setSelectedRoom(room);setStep(2);}}
                  style={{background:"white",border:"2px solid #e2e8f0",borderRadius:14,padding:"24px 20px",textAlign:"left",position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:room.color}}/>
                  <div style={{width:36,height:36,borderRadius:10,background:`${room.color}15`,color:room.color,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:15,fontWeight:700}}>{room.id}</div>
                  <div style={{fontSize:15,fontWeight:600,color:"#1e3a5f"}}>{room.name}</div>
                  <div style={{fontSize:12,color:"#64748b",marginTop:4,display:"flex",alignItems:"center",gap:4}}><UserIcon/> 定員 {room.capacity}名</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 2: Calendar */}
        {step===2 && (
          <div className="fade-in">
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
              <button onClick={()=>{setStep(1);setSelectedRoom(null);}} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 14px",fontSize:13,color:"#64748b"}}>← 戻る</button>
              <div>
                <h2 style={{fontSize:18,fontWeight:600,color:"#1e3a5f"}}>日付を選択</h2>
                <p style={{fontSize:13,color:"#64748b"}}><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:selectedRoom?.color,marginRight:6}}/>{selectedRoom?.name} ｜ 予約受付期間：7日前〜60日前</p>
              </div>
            </div>
            <div style={{background:"white",borderRadius:16,padding:28,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",maxWidth:480,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                <button onClick={prevMonth} style={{background:"#f1f5f9",border:"none",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",color:"#475569"}}><ChevronLeft/></button>
                <span style={{fontSize:17,fontWeight:600,color:"#1e3a5f"}}>{currentYear}年 {MONTHS_JP[currentMonth]}</span>
                <button onClick={nextMonth} style={{background:"#f1f5f9",border:"none",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",color:"#475569"}}><ChevronRight/></button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
                {WEEKDAYS.map((d,i) => (<div key={d} style={{textAlign:"center",fontSize:12,fontWeight:600,padding:"6px 0",color:i===0?"#ef4444":i===6?"#3b82f6":"#64748b"}}>{d}</div>))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
                {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
                {Array.from({length:daysInMonth}).map((_,i) => {
                  const day=i+1, dateStr=formatDate(new Date(currentYear,currentMonth,day));
                  const weekday=isWeekday(currentYear,currentMonth,day), inWindow=isWithinBookingWindow(currentYear,currentMonth,day);
                  const available=weekday&&inWindow, dayBookings=getBookingsForDate(dateStr);
                  const isToday=dateStr===formatDate(today), dow=new Date(currentYear,currentMonth,day).getDay();
                  return (<button key={day} disabled={!available} onClick={()=>{if(available){setSelectedDate(dateStr);setStep(3);}}}
                    style={{background:isToday?"#eff6ff":available?"white":"#f8fafc",border:isToday?"2px solid #2563eb":"1px solid #e2e8f0",borderRadius:10,padding:"8px 4px",minHeight:52,textAlign:"center",cursor:available?"pointer":"default",opacity:available?1:0.4,transition:"all 0.15s"}}
                    onMouseEnter={e=>{if(available)e.currentTarget.style.background="#dbeafe";}}
                    onMouseLeave={e=>{if(available)e.currentTarget.style.background=isToday?"#eff6ff":"white";}}>
                    <div style={{fontSize:14,fontWeight:isToday?700:500,color:dow===0?"#ef4444":dow===6?"#3b82f6":"#334155"}}>{day}</div>
                    {available&&dayBookings.length>0&&(<div style={{display:"flex",gap:2,justifyContent:"center",marginTop:3}}>{dayBookings.slice(0,3).map((b,bi)=>(<div key={bi} style={{width:5,height:5,borderRadius:"50%",background:ROOMS.find(r=>r.id===b.roomId)?.color||"#94a3b8"}}/>))}</div>)}
                    {available&&dayBookings.length===0&&(<div style={{fontSize:9,color:"#059669",marginTop:3,fontWeight:500}}>◎</div>)}
                  </button>);
                })}
              </div>
              <div style={{display:"flex",gap:16,marginTop:16,justifyContent:"center",fontSize:11,color:"#64748b"}}><span>◎ 空きあり</span><span>● 予約あり</span></div>
            </div>
          </div>
        )}

        {/* Step 3: Time + Form */}
        {step===3&&selectedDate&&(
          <div className="fade-in">
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
              <button onClick={()=>{setStep(2);setSelectedDate(null);setStartTime("");setEndTime("");setSelectedCategory(null);}} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 14px",fontSize:13,color:"#64748b"}}>← 戻る</button>
              <div>
                <h2 style={{fontSize:18,fontWeight:600,color:"#1e3a5f"}}>予約情報を入力</h2>
                <p style={{fontSize:13,color:"#64748b"}}><span style={{display:"inline-block",width:10,height:10,borderRadius:3,background:selectedRoom?.color,marginRight:6}}/>{selectedRoom?.name} ｜ {selectedDateObj&&`${selectedDateObj.getFullYear()}年${selectedDateObj.getMonth()+1}月${selectedDateObj.getDate()}日（${WEEKDAYS[selectedDateObj.getDay()]}）`}</p>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,alignItems:"start"}}>
              {/* Left */}
              <div style={{background:"white",borderRadius:16,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                <h3 style={{fontSize:14,fontWeight:600,color:"#1e3a5f",marginBottom:12}}>予約区分</h3>
                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
                  {CATEGORIES.map(cat=>(<button key={cat.id} onClick={()=>setSelectedCategory(cat.id)}
                    style={{background:selectedCategory===cat.id?"#eff6ff":"#f8fafc",border:selectedCategory===cat.id?"2px solid #2563eb":"1px solid #e2e8f0",borderRadius:10,padding:"12px 14px",textAlign:"left",transition:"all 0.15s"}}>
                    <div style={{fontSize:13,fontWeight:600,color:selectedCategory===cat.id?"#2563eb":"#334155"}}>{cat.label}</div>
                    <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{cat.desc}</div>
                  </button>))}
                </div>
                <h3 style={{fontSize:14,fontWeight:600,color:"#1e3a5f",marginBottom:8,display:"flex",alignItems:"center",gap:6}}><ClockIcon/> 利用時間</h3>
                <p style={{fontSize:11,color:"#ef4444",marginBottom:12}}>※ 12:00、12:30の利用開始は選択できません</p>
                <div style={{display:"flex",gap:12,marginBottom:12}}>
                  <div style={{flex:1}}>
                    <label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:4}}>開始</label>
                    <select value={startTime} onChange={e=>{setStartTime(e.target.value);setEndTime("");}} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:14,color:"#334155",background:"white"}}>
                      <option value="">選択</option>
                      {TIME_SLOTS.filter(t=>t!=="12:00"&&t!=="12:30"&&!isSlotBooked(selectedDate,t)).map(t=>(<option key={t} value={t}>{t}</option>))}
                    </select>
                  </div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:4}}>終了</label>
                    <select value={endTime} onChange={e=>setEndTime(e.target.value)} disabled={!startTime} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:14,color:"#334155",background:startTime?"white":"#f1f5f9"}}>
                      <option value="">選択</option>
                      {availableEndTimes.map(t=>(<option key={t} value={t}>{t}</option>))}
                    </select>
                  </div>
                </div>
                {/* Timeline */}
                <div style={{marginTop:16}}>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>タイムライン（9:00 - 17:00）</div>
                  <div style={{display:"flex",gap:2,borderRadius:6,overflow:"hidden"}}>
                    {TIME_SLOTS.map(t=>{
                      const booked=isSlotBooked(selectedDate,t), isLunch=t==="12:00"||t==="12:30";
                      const isSelected=startTime&&endTime&&t>=startTime&&t<endTime;
                      let bg="#e2e8f0"; if(isSelected)bg=selectedRoom?.color||"#2563eb"; else if(booked)bg="#fca5a5"; else if(isLunch)bg="#fde68a"; else bg="#bbf7d0";
                      return (<div key={t} style={{flex:1,height:20,background:bg,borderRadius:2}} title={`${t} ${booked?"予約済":isLunch?"昼休み":"空き"}`}/>);
                    })}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",marginTop:3}}><span>9:00</span><span>12:00</span><span>17:00</span></div>
                  <div style={{display:"flex",gap:12,marginTop:8,fontSize:10,color:"#64748b"}}>
                    <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#bbf7d0",marginRight:3}}/>空き</span>
                    <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#fca5a5",marginRight:3}}/>予約済</span>
                    <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#fde68a",marginRight:3}}/>昼休み</span>
                    {startTime&&endTime&&<span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:selectedRoom?.color,marginRight:3}}/>選択中</span>}
                  </div>
                </div>
              </div>
              {/* Right: Form */}
              <div style={{background:"white",borderRadius:16,padding:24,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
                <h3 style={{fontSize:14,fontWeight:600,color:"#1e3a5f",marginBottom:16,display:"flex",alignItems:"center",gap:6}}><BuildingIcon/> 予約者情報</h3>
                {[
                  {key:"name",label:"氏名",type:"text",placeholder:"山田 太郎",required:true},
                  {key:"company",label:"所属（会社名）",type:"text",placeholder:"○○製薬株式会社",required:true},
                  {key:"email",label:"メールアドレス",type:"email",placeholder:"example@company.co.jp",required:true},
                  {key:"phone",label:"電話番号",type:"tel",placeholder:"03-xxxx-xxxx"},
                  {key:"trialName",label:"治験名（課題名）",type:"text",placeholder:"○○○○の第Ⅲ相試験",required:true},
                ].map(field=>(
                  <div key={field.key} style={{marginBottom:14}}>
                    <label style={{display:"block",fontSize:12,fontWeight:500,color:"#475569",marginBottom:4}}>{field.label}{field.required&&<span style={{color:"#ef4444",marginLeft:3}}>*</span>}</label>
                    <input type={field.type} placeholder={field.placeholder} value={formData[field.key]} onChange={e=>setFormData({...formData,[field.key]:e.target.value})}
                      style={{width:"100%",padding:"10px 12px",borderRadius:8,border:errors[field.key]?"1px solid #ef4444":"1px solid #e2e8f0",fontSize:13,color:"#334155",transition:"border 0.2s"}}/>
                    {errors[field.key]&&<div style={{fontSize:11,color:"#ef4444",marginTop:3}}>{errors[field.key]}</div>}
                  </div>
                ))}
                <div style={{marginBottom:14}}>
                  <label style={{display:"block",fontSize:12,fontWeight:500,color:"#475569",marginBottom:4}}>備考</label>
                  <textarea placeholder="同行者の有無、治験薬回収の予定など" value={formData.remarks} onChange={e=>setFormData({...formData,remarks:e.target.value})} rows={3}
                    style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #e2e8f0",fontSize:13,color:"#334155",resize:"vertical",transition:"border 0.2s"}}/>
                </div>
                <button onClick={()=>{
                  if(!selectedCategory){alert("予約区分を選択してください");return;}
                  if(!startTime||!endTime){alert("利用時間を選択してください");return;}
                  if(validateForm())setStep(4);
                }} style={{width:"100%",padding:"14px",borderRadius:10,background:"linear-gradient(135deg,#1e3a5f,#2563eb)",color:"white",border:"none",fontSize:15,fontWeight:600,letterSpacing:"0.03em",transition:"all 0.2s",boxShadow:"0 4px 15px rgba(37,99,235,0.3)"}}
                  onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
                  確認画面へ →
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Step 4: Confirm */}
        {step===4&&(
          <div className="fade-in" style={{maxWidth:600,margin:"0 auto"}}>
            <div style={{background:"white",borderRadius:16,padding:32,boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
              <h2 style={{fontSize:20,fontWeight:700,color:"#1e3a5f",marginBottom:6,textAlign:"center"}}>予約内容の確認</h2>
              <p style={{fontSize:13,color:"#64748b",textAlign:"center",marginBottom:24}}>以下の内容でよろしければ「予約する」を押してください</p>
              <div style={{background:"#f8fafc",borderRadius:12,padding:20,marginBottom:24,border:"1px solid #e2e8f0"}}>
                {[
                  {label:"会議室",value:selectedRoom?.name},
                  {label:"予約区分",value:CATEGORIES.find(c=>c.id===selectedCategory)?.label},
                  {label:"日時",value:selectedDateObj?`${selectedDateObj.getFullYear()}年${selectedDateObj.getMonth()+1}月${selectedDateObj.getDate()}日（${WEEKDAYS[selectedDateObj.getDay()]}） ${startTime}〜${endTime}`:""},
                  {label:"氏名",value:formData.name},
                  {label:"所属",value:formData.company},
                  {label:"メール",value:formData.email},
                  {label:"電話番号",value:formData.phone||"（未入力）"},
                  {label:"治験名",value:formData.trialName},
                  {label:"備考",value:formData.remarks||"（なし）"},
                ].map((item,i)=>(
                  <div key={i} style={{display:"flex",padding:"10px 0",borderBottom:i<8?"1px solid #e2e8f0":"none"}}>
                    <div style={{width:100,fontSize:12,color:"#64748b",fontWeight:500,flexShrink:0,paddingTop:1}}>{item.label}</div>
                    <div style={{fontSize:13,color:"#1e3a5f",fontWeight:500}}>{item.value}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:12}}>
                <button onClick={()=>setStep(3)} style={{flex:1,padding:"14px",borderRadius:10,background:"white",color:"#475569",border:"1px solid #e2e8f0",fontSize:14,fontWeight:500}}>← 修正する</button>
                <button onClick={handleSubmit} style={{flex:2,padding:"14px",borderRadius:10,background:"linear-gradient(135deg,#059669,#10b981)",color:"white",border:"none",fontSize:15,fontWeight:600,boxShadow:"0 4px 15px rgba(5,150,105,0.3)",transition:"all 0.2s"}}
                  onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
                  予約する ✓
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Step 5: Done */}
        {step===5&&(
          <div className="fade-in" style={{maxWidth:500,margin:"0 auto",textAlign:"center"}}>
            <div style={{background:"white",borderRadius:16,padding:"48px 32px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
              <div style={{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#059669,#10b981)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",animation:"pulse 0.6s ease"}}>
                <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="white" strokeWidth="2.5"><polyline points="20,6 9,17 4,12"/></svg>
              </div>
              <h2 style={{fontSize:22,fontWeight:700,color:"#1e3a5f",marginBottom:8}}>予約を受け付けました</h2>
              <p style={{fontSize:14,color:"#64748b",marginBottom:6}}>担当者が確認後、予約確定のメールを送信いたします。</p>
              <p style={{fontSize:12,color:"#94a3b8",marginBottom:32}}>※ 確定後に会議室を変更させていただく場合があります</p>
              <div style={{background:"#f0fdf4",borderRadius:10,padding:16,marginBottom:28,border:"1px solid #bbf7d0",textAlign:"left"}}>
                <div style={{fontSize:12,color:"#059669",fontWeight:600,marginBottom:8}}>予約概要</div>
                <div style={{fontSize:13,color:"#334155"}}>{selectedRoom?.name} ｜ {selectedDateObj&&`${selectedDateObj.getMonth()+1}/${selectedDateObj.getDate()}`} {startTime}〜{endTime}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{formData.name}（{formData.company}）</div>
              </div>
              <button onClick={resetAll} style={{padding:"14px 40px",borderRadius:10,background:"linear-gradient(135deg,#1e3a5f,#2563eb)",color:"white",border:"none",fontSize:14,fontWeight:600,boxShadow:"0 4px 15px rgba(37,99,235,0.3)",transition:"all 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
                新しい予約を作成
              </button>
            </div>
          </div>
        )}

        <div style={{textAlign:"center",marginTop:40,fontSize:11,color:"#94a3b8",lineHeight:1.8}}>
          <p>実施可能時間：平日 9:00〜17:00 ｜ 予約受付：実施日の60日前〜7日前</p>
          <p>予約確定後のキャンセルは原則不可です。</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
